<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvest Hub Orders</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
padding:40px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

header h1{
color:#2e7d32;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
}

.orders{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.order-card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.order-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.order-card h3{
color:#2e7d32;
margin-bottom:5px;
}

.qty{
font-weight:bold;
}

.customer{
font-size:14px;
color:#666;
}

</style>
</head>

<body>
<header>
<h1>📦 Orders</h1>
<button onclick="goBack()">Back</button>
</header>
<div class="orders" id="orders"></div>

<script>
if(!localStorage.getItem("token")){
window.location="login.html";
}
const API="http://localhost:5000";

function getToken(){
return localStorage.getItem("token");
}

async function loadOrders(){
const res = await fetch(API+"/orders",{
headers:{
Authorization:"Bearer "+getToken()
}
});
const orders = await res.json();
console.log("ORDERS:",orders);
const container=document.getElementById("orders");
container.innerHTML="";

if(!orders.length){
container.innerHTML="<p>No orders yet</p>";
return;
}

orders.forEach(o=>{
if(!o.product) return;
container.innerHTML+=`
<div class="order-card">
<img src="http://localhost:5000/uploads/${o.product.image}" />
<h3>${o.product.name}</h3>
<p><b>Quantity:</b> ${o.quantity} kg</p>
<p><b>Status:</b> ${o.status || "Pending"}</p>
<p><b>Customer:</b> ${o.customer ? o.customer.email : "Customer"}</p>
</div>
`;
});
}

function goBack(){
history.back();
}

loadOrders();
</script>

</body>
</html>
