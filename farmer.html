<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#dfeee0,#c8e6c9);
padding:40px;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

header h1{
color:#2e7d32;
font-size:28px;
}

.logout{
background:#e53935;
color:white;
border:none;
padding:10px 20px;
border-radius:25px;
cursor:pointer;
}

/* STATS CARDS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.stat-card h2{
color:#2e7d32;
font-size:26px;
}

.stat-card p{
color:#666;
}

/* ADD PRODUCT */
.add-card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.add-card h2{
color:#2e7d32;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #ddd;
}

.add-btn{
background:#2e7d32;
color:white;
border:none;
padding:12px;
border-radius:25px;
cursor:pointer;
width:100%;
font-weight:bold;
}

/* PRODUCTS GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:20px;
}

/* PRODUCT CARD */
.product{
background:white;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
padding:15px;
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.product h3{
color:#2e7d32;
margin-bottom:5px;
}

.price{
font-weight:bold;
color:#444;
}

.actions{
margin-top:10px;
display:flex;
justify-content:center;
gap:10px;
}

.orders-btn{
background:#43a047;
color:white;
border:none;
padding:12px 18px;
border-radius:25px;
cursor:pointer;
font-weight:bold;
margin-top:15px;
}

.orders-btn:hover{
background:#2e7d32;
}

.delete{
background:#e53935;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}
/* 🔔 NOTIFICATION */
.notification{
position:relative;
}

.bell{
background:white;
padding:10px;
border-radius:50%;
cursor:pointer;
font-size:18px;
position:relative;
}

#notifyCount{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:50%;
}

.notification-box{
position:absolute;
top:45px;
right:0;
width:260px;
background:white;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
display:none;
padding:15px;
z-index:100;
}

.note{
padding:8px;
border-bottom:1px solid #eee;
font-size:14px;
}

</style>
</head>

<body>
<header>
<h1 id="welcome">🌾 Farmer Dashboard</h1>
<div style="display:flex;gap:15px;align-items:center;">

<!-- Notification Bell -->
<div class="notification">
<div class="bell" onclick="toggleNotifications()">
🔔
<span id="notifyCount">0</span>
</div>

<div class="notification-box" id="notificationBox">
<h4 style="color:#2e7d32;margin-bottom:10px;">Notifications</h4>
<div id="notificationList"></div>
</div>
</div>

<button class="logout" onclick="logout()">Logout</button>
</div>
</header>

<!-- STATS -->
<div class="stats">

<div class="stat-card">
<h2 id="totalProducts">0</h2>
<p>Total Products</p>
</div>

<div class="stat-card">
<h2 id="totalStock">0</h2>
<p>Total Stock</p>
</div>
</div>

<!-- ADD PRODUCT -->
<div class="add-card">
<h2>Add Product</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="quantity" placeholder="Quantity in KG">
<input type="file" id="image">

<button class="add-btn" onclick="addProduct()">Add Product</button>
<button class="orders-btn" onclick="goOrders()">📦 Orders</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<div id="popup" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:999;
">

<div style="
background:white;
padding:25px;
border-radius:15px;
text-align:center;
width:300px;
">

<h3>Delete this product?</h3>

<button onclick="confirmDelete()" style="
margin:10px;
padding:10px 20px;
background:#e53935;
color:white;
border:none;
border-radius:10px;
">Yes</button>

<button onclick="closePopup()" style="
margin:10px;
padding:10px 20px;
background:#ccc;
border:none;
border-radius:10px;
">Cancel</button>

</div>
</div>

<script>
const API="http://localhost:5000";
function getUser(){
const token = localStorage.getItem("token");
if(!token) return null;

const payload = JSON.parse(atob(token.split('.')[1]));
return payload;
}
const user = getUser();
if(user){
document.getElementById("welcome").innerText =
" Welcome, " + user.name;
}
function getToken(){
return localStorage.getItem("token");
}
function goOrders(){
window.location="orders.html";
}

function logout(){
localStorage.removeItem("token");
window.location="login.html";
}

/* LOAD PRODUCTS */
async function loadProducts(){
const res = await fetch(API+"/products",{
headers:{
Authorization:"Bearer "+getToken()
}
});

const products = await res.json();
const container = document.getElementById("products");
container.innerHTML="";

/* SHOW MESSAGE IF NO PRODUCTS */
if(products.length === 0){
container.innerHTML = `
<div style="
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
">

<h3>No products yet 🌾</h3>
<p>Add your first product above to start selling.</p>

</div>
`;
return;
}

/* DISPLAY PRODUCTS */
let totalStock = 0;
products.forEach(p=>{
totalStock += p.quantity;
container.innerHTML+=`
<div class="product">

<img 
src="${p.image 
? 'http://localhost:5000/uploads/' + encodeURIComponent(p.image)
: 'http://localhost:5000/images/app1.png'}"
onerror="this.src='http://localhost:5000/images/app1.png'">

<h3>${p.name}</h3>
<p class="price">₹ ${p.price}</p>
<p>Stock: ${p.quantity} kg</p>

<div class="actions">
<button class="delete" onclick="deleteProduct('${p._id}')">
Delete
</button>
</div>

</div>
`;
});

/* UPDATE STATS */
document.getElementById("totalProducts").innerText = products.length;
document.getElementById("totalStock").innerText = totalStock;
}

/* ADD PRODUCT */
async function addProduct(){
const name=document.getElementById("name").value;
const price=document.getElementById("price").value;
const quantity=document.getElementById("quantity").value;
const image=document.getElementById("image").files[0];

if(!name || !price || !quantity || !image){
alert("Please fill all fields");
return;
}

const formData = new FormData();

formData.append("name",name);
formData.append("price",price);
formData.append("quantity",quantity);
formData.append("image",image);
try{

const res = await fetch(API+"/add-product",{
method:"POST",
headers:{
Authorization:"Bearer "+getToken()
},
body:formData
});

const data = await res.json();
alert(data.message);
loadProducts();
}catch(err){
console.error(err);
alert("Error adding product");
}
}

/* DELETE PRODUCT */
async function deleteProduct(id){
const confirmDelete = window.confirm("Delete this product?");
if(!confirmDelete) return;
const res = await fetch(API+"/farmer/delete-product/"+id,{
method:"DELETE",
headers:{
Authorization:"Bearer "+getToken()
}
});
const data = await res.json();
alert(data.message);
loadProducts();   // reload products after delete
}

let deleteId = null;

function deleteProduct(id){
deleteId = id;
document.getElementById("popup").style.display = "flex";
}

function closePopup(){
document.getElementById("popup").style.display = "none";
}

async function confirmDelete(){
await fetch(API+"/farmer/delete-product/"+deleteId,{
method:"DELETE",
headers:{
Authorization:"Bearer "+getToken()
}
});

closePopup();
loadProducts();
}

async function loadNotifications(){
const res = await fetch("http://localhost:5000/notifications",{
headers:{
Authorization:"Bearer "+localStorage.getItem("token")
}
});

const notes = await res.json();
console.log("NOTIFICATIONS:", notes);

const list = document.getElementById("notificationList");
const count = document.getElementById("notifyCount");

count.innerText = notes.length;
list.innerHTML = "";

notes.forEach(n=>{
list.innerHTML += `<div class="note">${n.message}</div>`;
});
}

function toggleNotifications(){
const box = document.getElementById("notificationBox");

box.style.display =
box.style.display === "block" ? "none" : "block";

loadNotifications();
}
loadNotifications();
loadProducts();
</script>
</body>
</html>
