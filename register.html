<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvest Hub Register</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#eef5ee,#c8e6c9);
padding-top:60px;
display:flex;
justify-content:center;
}

.wrapper{
width:420px;
position:relative;
}

.top-bg{
height:180px;
background:linear-gradient(135deg,#2e7d32,#1b5e20);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:460px;
margin-left:-20px;
border-top-left-radius:45px;
border-top-right-radius:45px;
border-bottom-left-radius:0;
border-bottom-right-radius:0;
}

.register-card{
position:relative;
top:-90px;
background:#f5f5f5;
border-radius:35px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
padding:45px 35px;
text-align:center;
}

.register-card h1{
color:#2e7d32;
margin-bottom:6px;
}

.subtitle{
color:#777;
margin-bottom:28px;
}

.roles{
display:flex;
justify-content:center;
gap:25px;
margin-bottom:30px;
}

.role{
width:130px;
background:#e0e0e0;
padding:18px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.role span{
font-size:28px;
display:block;
margin-bottom:6px;
}

.role.active{
background:#a5d6a7;
}

.role:hover{
background:#c8e6c9;
}

input{
width:100%;
padding:15px;
margin-bottom:18px;
border:none;
border-radius:14px;
background:#eaeaea;
font-size:15px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:35px;
background:#2e7d32;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.login{
margin-top:18px;
font-size:14px;
}

.login a{
color:#2e7d32;
font-weight:bold;
text-decoration:none;
}

</style>
</head>

<body>
<div class="wrapper">
<div class="top-bg"></div>
<div class="register-card">
<h1>🌾 Create Harvest Hub Account</h1>
<p class="subtitle">
Join the farm-to-table marketplace
</p>
<div class="roles">
<div class="role active" onclick="selectRole(this,'customer')">
<span>🛒</span>
Customer
</div>

<div class="role" onclick="selectRole(this,'farmer')">
<span>🌾</span>
Farmer
</div>
</div>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password *" required>

<p id="passError" style="color:red;font-size:13px;display:none;">
Password must contain uppercase, lowercase, number and symbol
</p>
<button onclick="register()">Register</button>

<div class="login">
Already have an account?
<a href="login.html">Login</a>
</div>
</div>
</div>

<script>
let role="customer";
function selectRole(el,r){
document.querySelectorAll(".role").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
role=r;
}

async function register(){
const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
// Password regex
const pattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{6,}$/;

if(!pattern.test(password)){
document.getElementById("passError").style.display = "block";
return;
}else{
document.getElementById("passError").style.display = "none";
}

console.log("ROLE SENT:",role);
const res=await fetch("http://localhost:5000/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({name,email,password,role})
});

const data=await res.json();
alert(data.message || data);
window.location="login.html";
}
</script>

</body>
</html>
